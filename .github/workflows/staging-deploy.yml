name: Staging Deploy

on:
  push:
    branches:
      - staging
  workflow_dispatch:

concurrency:
  group: staging-deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}
  BACKEND_IMAGE_NAME: autopilot-driving-backend
  FRONTEND_IMAGE_NAME: autopilot-driving-frontend

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      backend_image: ${{ steps.meta.outputs.backend_image }}
      frontend_image: ${{ steps.meta.outputs.frontend_image }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image refs
        id: meta
        run: |
          OWNER_LC="$(echo "${IMAGE_OWNER}" | tr '[:upper:]' '[:lower:]')"
          TAG="${GITHUB_SHA::7}"
          BACKEND="${REGISTRY}/${OWNER_LC}/${BACKEND_IMAGE_NAME}"
          FRONTEND="${REGISTRY}/${OWNER_LC}/${FRONTEND_IMAGE_NAME}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "backend_image=${BACKEND}:${TAG}" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${FRONTEND}:${TAG}" >> "$GITHUB_OUTPUT"
          echo "backend_repo=${BACKEND}" >> "$GITHUB_OUTPUT"
          echo "frontend_repo=${FRONTEND}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: runner
          push: true
          tags: |
            ${{ steps.meta.outputs.backend_repo }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.backend_repo }}:staging
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: runner
          push: true
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_BACKEND_API_BASE_URL=${{ vars.NEXT_PUBLIC_BACKEND_API_BASE_URL }}
          tags: |
            ${{ steps.meta.outputs.frontend_repo }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.frontend_repo }}:staging
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.STAGING_VPS_SSH_KEY }}
          known_hosts: unnecessary
          if_key_exists: replace

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${STAGING_VPS_PORT}" -H "${STAGING_VPS_HOST}" >> ~/.ssh/known_hosts
        env:
          STAGING_VPS_HOST: ${{ secrets.STAGING_VPS_HOST }}
          STAGING_VPS_PORT: ${{ secrets.STAGING_VPS_PORT }}

      - name: Upload deploy bundle
        run: |
          scp -P "${STAGING_VPS_PORT}" \
            deploy/staging/docker-compose.staging.yml \
            deploy/staging/deploy.sh \
            "${STAGING_VPS_USER}@${STAGING_VPS_HOST}:${STAGING_APP_PATH}/"
        env:
          STAGING_VPS_HOST: ${{ secrets.STAGING_VPS_HOST }}
          STAGING_VPS_PORT: ${{ secrets.STAGING_VPS_PORT }}
          STAGING_VPS_USER: ${{ secrets.STAGING_VPS_USER }}
          STAGING_APP_PATH: ${{ secrets.STAGING_APP_PATH }}

      - name: Render .env.staging
        run: |
          umask 077
          cat > .env.staging <<EOF
          # Postgres
          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          POSTGRES_DB=${POSTGRES_DB}

          # Redis
          REDIS_PASSWORD=${REDIS_PASSWORD}
          REDIS_DB=${REDIS_DB}

          # Public URLs
          NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
          NEXT_PUBLIC_BACKEND_API_BASE_URL=${NEXT_PUBLIC_BACKEND_API_BASE_URL}

          # NextAuth
          NEXTAUTH_URL=${NEXTAUTH_URL}
          NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
          NEXTAUTH_BRIDGE_SECRET=${NEXTAUTH_BRIDGE_SECRET}

          # Backend JWT
          JWT_SECRET=${JWT_SECRET}
          JWT_ACCESS_EXPIRATION_MINUTES=${JWT_ACCESS_EXPIRATION_MINUTES}
          JWT_REFRESH_EXPIRATION_DAYS=${JWT_REFRESH_EXPIRATION_DAYS}
          JWT_RESET_PASSWORD_EXPIRATION_MINUTES=${JWT_RESET_PASSWORD_EXPIRATION_MINUTES}
          JWT_VERIFY_EMAIL_EXPIRATION_MINUTES=${JWT_VERIFY_EMAIL_EXPIRATION_MINUTES}

          # SMTP
          SMTP_HOST=${SMTP_HOST}
          SMTP_PORT=${SMTP_PORT}
          SMTP_USER=${SMTP_USER}
          SMTP_PASS=${SMTP_PASS}
          EMAIL_FROM=${EMAIL_FROM}

          # Google Places
          GOOGLE_PLACES_API_KEY=${GOOGLE_PLACES_API_KEY}
          GOOGLE_PLACE_ID=${GOOGLE_PLACE_ID}
          EOF
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          REDIS_DB: ${{ vars.REDIS_DB }}
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_BACKEND_API_BASE_URL: ${{ vars.NEXT_PUBLIC_BACKEND_API_BASE_URL }}
          NEXTAUTH_URL: ${{ vars.NEXTAUTH_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_BRIDGE_SECRET: ${{ secrets.NEXTAUTH_BRIDGE_SECRET }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_ACCESS_EXPIRATION_MINUTES: ${{ vars.JWT_ACCESS_EXPIRATION_MINUTES }}
          JWT_REFRESH_EXPIRATION_DAYS: ${{ vars.JWT_REFRESH_EXPIRATION_DAYS }}
          JWT_RESET_PASSWORD_EXPIRATION_MINUTES: ${{ vars.JWT_RESET_PASSWORD_EXPIRATION_MINUTES }}
          JWT_VERIFY_EMAIL_EXPIRATION_MINUTES: ${{ vars.JWT_VERIFY_EMAIL_EXPIRATION_MINUTES }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ vars.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ vars.EMAIL_FROM }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          GOOGLE_PLACE_ID: ${{ secrets.GOOGLE_PLACE_ID }}

      - name: Upload .env.staging to VPS
        run: |
          scp -P "${STAGING_VPS_PORT}" .env.staging \
            "${STAGING_VPS_USER}@${STAGING_VPS_HOST}:${STAGING_APP_PATH}/.env.staging"
          ssh -p "${STAGING_VPS_PORT}" "${STAGING_VPS_USER}@${STAGING_VPS_HOST}" \
            "chmod 600 ${STAGING_APP_PATH}/.env.staging"
        env:
          STAGING_VPS_HOST: ${{ secrets.STAGING_VPS_HOST }}
          STAGING_VPS_PORT: ${{ secrets.STAGING_VPS_PORT }}
          STAGING_VPS_USER: ${{ secrets.STAGING_VPS_USER }}
          STAGING_APP_PATH: ${{ secrets.STAGING_APP_PATH }}

      - name: Deploy on VPS
        run: |
          ssh -p "${STAGING_VPS_PORT}" "${STAGING_VPS_USER}@${STAGING_VPS_HOST}" \
            "cd ${STAGING_APP_PATH} \
              && chmod +x deploy.sh \
              && BACKEND_IMAGE='${BACKEND_IMAGE}' \
                 FRONTEND_IMAGE='${FRONTEND_IMAGE}' \
                 GHCR_USERNAME='${GHCR_USERNAME}' \
                 GHCR_TOKEN='${GHCR_TOKEN}' \
                 ./deploy.sh"
        env:
          STAGING_VPS_HOST: ${{ secrets.STAGING_VPS_HOST }}
          STAGING_VPS_PORT: ${{ secrets.STAGING_VPS_PORT }}
          STAGING_VPS_USER: ${{ secrets.STAGING_VPS_USER }}
          STAGING_APP_PATH: ${{ secrets.STAGING_APP_PATH }}
          BACKEND_IMAGE: ${{ needs.build.outputs.backend_image }}
          FRONTEND_IMAGE: ${{ needs.build.outputs.frontend_image }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
