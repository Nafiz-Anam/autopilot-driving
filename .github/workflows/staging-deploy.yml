name: Staging CI/CD to VPS

on:
  push:
    branches:
      - staging
    paths:
      - ".github/workflows/staging-deploy.yml"
      - "backend/**"
      - "frontend/**"
      - "deploy/staging/**"
  workflow_dispatch:

concurrency:
  group: staging-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: docker.io
  FRONTEND_IMAGE_NAME: autopilot-driving-frontend
  BACKEND_IMAGE_NAME: autopilot-driving-backend
  DEPLOY_PATH: deploy/staging

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 45
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        service: [backend, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        if: matrix.service == 'backend'
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE_NAME }}:staging
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build and push frontend image
        if: matrix.service == 'frontend'
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE_NAME }}:staging
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  deploy:
    name: Deploy on VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout deploy files only
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            deploy/staging/docker-compose.staging.yml
            deploy/staging/deploy.sh
          sparse-checkout-cone-mode: false

      - name: Copy staging deployment files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_VPS_HOST }}
          username: ${{ secrets.STAGING_VPS_USER }}
          key: ${{ secrets.STAGING_VPS_SSH_KEY }}
          port: ${{ secrets.STAGING_VPS_PORT }}
          source: "${{ env.DEPLOY_PATH }}/docker-compose.staging.yml,${{ env.DEPLOY_PATH }}/deploy.sh"
          target: ${{ secrets.STAGING_APP_PATH }}
          strip_components: 2

      - name: Deploy latest staging images on VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG: ${{ github.sha }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          STAGING_ENV_FILE: ${{ secrets.STAGING_ENV_FILE }}
          STAGING_APP_PATH: ${{ secrets.STAGING_APP_PATH }}
        with:
          host: ${{ secrets.STAGING_VPS_HOST }}
          username: ${{ secrets.STAGING_VPS_USER }}
          key: ${{ secrets.STAGING_VPS_SSH_KEY }}
          port: ${{ secrets.STAGING_VPS_PORT }}
          envs: IMAGE_TAG,DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,STAGING_ENV_FILE,STAGING_APP_PATH
          script: |
            set -eu
            mkdir -p "$STAGING_APP_PATH"
            cd "$STAGING_APP_PATH"

            printf "%s" "$STAGING_ENV_FILE" > .env.staging
            chmod 600 .env.staging
            chmod +x deploy.sh

            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            IMAGE_TAG="$IMAGE_TAG" DOCKERHUB_USERNAME="$DOCKERHUB_USERNAME" ./deploy.sh
            docker image prune -f
