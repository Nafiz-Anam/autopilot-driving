# AutoPilot Driving School — Development Compose with hot reload
#
# Usage:
#   docker compose -f docker-compose.dev.yml up              # start all
#   docker compose -f docker-compose.dev.yml watch           # start + file watch
#   docker compose -f docker-compose.dev.yml --profile tools up  # + pgAdmin + Redis Insight
#
# Port map:
#   Frontend  (Next.js dev)  : 3008
#   Backend   (nodemon)      : 8008
#   PostgreSQL               : 5440
#   Redis                    : 6387

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: autopilot_db_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-autopilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-autopilot_secret}
      POSTGRES_DB:       ${POSTGRES_DB:-autopilot}
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5440:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-autopilot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis/redis-stack-server:latest
    container_name: autopilot_redis_dev
    restart: unless-stopped
    ports:
      - "6387:6379"
    volumes:
      - redis_data_dev:/data
      - ./backend/docker/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Backend (nodemon hot reload) ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: autopilot_backend_dev
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV:     development
      PORT:         8000
      DATABASE_URL: postgresql://${POSTGRES_USER:-autopilot}:${POSTGRES_PASSWORD:-autopilot_secret}@db:5432/${POSTGRES_DB:-autopilot}
      REDIS_HOST:   redis
      REDIS_PORT:   6379
      CLIENT_URL:   ${NEXT_PUBLIC_APP_URL:-http://localhost:3008}
      SMTP_USERNAME: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASS:-}
      JWT_SECRET:   ${JWT_SECRET:-change-me-jwt-secret}
    ports:
      - "8008:8000"
    volumes:
      - ./backend:/app
      - backend_nm:/app/node_modules
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./backend/src
          target: /app/src
        - action: sync
          path: ./backend/prisma
          target: /app/prisma
        - action: rebuild
          path: ./backend/package.json
        - action: rebuild
          path: ./backend/pnpm-lock.yaml

  # ── Frontend (Next.js dev server) ───────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: autopilot_frontend_dev
    restart: unless-stopped
    environment:
      DATABASE_URL:    postgresql://${POSTGRES_USER:-autopilot}:${POSTGRES_PASSWORD:-autopilot_secret}@db:5432/${POSTGRES_DB:-autopilot}
      NEXTAUTH_URL:    ${NEXTAUTH_URL:-http://localhost:3008}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      GOOGLE_CLIENT_ID:     ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      STRIPE_SECRET_KEY:           ${STRIPE_SECRET_KEY:-}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET:       ${STRIPE_WEBHOOK_SECRET:-}
      SMTP_HOST:  ${SMTP_HOST:-}
      SMTP_PORT:  ${SMTP_PORT:-587}
      SMTP_USER:  ${SMTP_USER:-}
      SMTP_PASS:  ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-hello@autopilotdriving.co.uk}
      NEXT_PUBLIC_APP_URL:     ${NEXT_PUBLIC_APP_URL:-http://localhost:3008}
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://localhost:8008}
      NODE_ENV: development
      PORT:     3000
      HOSTNAME: 0.0.0.0
      AUTH_TRUST_HOST: "true"
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3008:3000"
    volumes:
      - ./frontend:/app
      - frontend_nm:/app/node_modules
      - frontend_next:/app/.next
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    develop:
      watch:
        - action: sync
          path: ./frontend/app
          target: /app/app
        - action: sync
          path: ./frontend/components
          target: /app/components
        - action: sync
          path: ./frontend/lib
          target: /app/lib
        - action: sync
          path: ./frontend/hooks
          target: /app/hooks
        - action: sync
          path: ./frontend/types
          target: /app/types
        - action: sync
          path: ./frontend/public
          target: /app/public
        - action: rebuild
          path: ./frontend/package.json
        - action: rebuild
          path: ./frontend/pnpm-lock.yaml

  # ── pgAdmin (optional) ───────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: autopilot_pgadmin_dev
    restart: unless-stopped
    profiles:
      - tools
    environment:
      PGADMIN_DEFAULT_EMAIL:    ${PGADMIN_EMAIL:-admin@autopilot.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5058:80"
    depends_on:
      db:
        condition: service_healthy

  # ── Redis Insight (optional) ─────────────────────────────────────────────────
  redis-insight:
    image: redis/redisinsight:latest
    container_name: autopilot_redis_insight_dev
    restart: unless-stopped
    profiles:
      - tools
    ports:
      - "8009:5540"
    volumes:
      - redis_insight_data_dev:/data
    depends_on:
      - redis

volumes:
  postgres_data_dev:
    name: autopilot_postgres_data_dev
  redis_data_dev:
    name: autopilot_redis_data_dev
  redis_insight_data_dev:
    name: autopilot_redis_insight_data_dev
  backend_nm:
    name: autopilot_backend_nm
  frontend_nm:
    name: autopilot_frontend_nm
  frontend_next:
    name: autopilot_frontend_next
