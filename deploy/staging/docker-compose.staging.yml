services:
  db:
    image: postgres:16-alpine
    container_name: autopilot_staging_db
    restart: unless-stopped
    env_file:
      - .env.staging
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
    networks:
      - autopilot-staging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis/redis-stack-server:latest
    container_name: autopilot_staging_redis
    restart: unless-stopped
    volumes:
      - redis_staging_data:/data
    networks:
      - autopilot-staging
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    image: docker.io/${DOCKERHUB_USERNAME}/autopilot-driving-backend:${IMAGE_TAG}
    container_name: autopilot_staging_backend
    restart: unless-stopped
    env_file:
      - .env.staging
    environment:
      NODE_ENV: production
      PORT: 8000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CLIENT_URL: ${NEXT_PUBLIC_APP_URL}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8008:8000"
    networks:
      - autopilot-staging

  frontend:
    image: docker.io/${DOCKERHUB_USERNAME}/autopilot-driving-frontend:${IMAGE_TAG}
    container_name: autopilot_staging_frontend
    restart: unless-stopped
    env_file:
      - .env.staging
    environment:
      NODE_ENV: production
      PORT: 3008
      HOSTNAME: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      AUTH_TRUST_HOST: "true"
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    ports:
      - "3008:3008"
    networks:
      - autopilot-staging

volumes:
  postgres_staging_data:
  redis_staging_data:

networks:
  autopilot-staging:
    driver: bridge
